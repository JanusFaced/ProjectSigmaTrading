services:
  frontend:
    image: js_app_frontend
    build: 
      context: ./frontend
    networks:
      - app-network
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    image: python_app_backend
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      DB_HOST: dataBase
      DB_PORT: 5432
    build:
      context: ./backend
    networks:
      - app-network
    ports:
      - "8000:8000"
    depends_on:
      dataBase:
        condition: service_healthy

  MLPipeline:
    image: python_app_ml_pipeline
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      DB_HOST: dataBase
      DB_PORT: 5432
    build:
      context: ./MLPipeline
    volumes:
      - ./MLPipeline/app/output:/app/output
    networks:
      - app-network
    depends_on:
      dataBase:
        condition: service_healthy

  dataBase:
    image: postgres:16.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    ports:
      - "5432:5432"
    volumes:
      - dsmlai_edu_db-data:/var/lib/postgresql/data

volumes:
  dsmlai_edu_db-data:
    external: true

networks:
  app-network:
    driver: bridge

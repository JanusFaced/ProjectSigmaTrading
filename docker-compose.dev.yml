  parser:
    image: rust_parser
    build:
      context: ./parser_rust
    networks:
      - app-network
    depends_on:
      - dataBase
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      DB_HOST: dataBase
      DB_PORT: 5432
      GLOBAL_WORK_MODE: 'imitation'
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
    labels:
      - "logging=promtail"
    restart: unless-stopped


[tool.mypy]
# Базовая конфигурация
python_version = "3.11"
warn_unused_configs = true
pretty = true
show_error_context = true
show_column_numbers = true
error_summary = true

# Уровень строгости (начинаем с режима 1)
# Режим 1: Почти всё проверяем, но не падаем из-за пропущенных типов в чужих библиотеках
warn_return_any = true
warn_unused_ignores = false
warn_no_return = true
warn_redundant_casts = false
no_implicit_optional = true
strict_optional = true

# Отключаем самые строгие проверки (пока)
disallow_untyped_defs = false
disallow_any_unimported = false
disallow_untyped_calls = false
disallow_incomplete_defs = false
check_untyped_defs = false

# Исключения (папки которые не проверяем)
exclude = [
    "tests/",
    "venv/",
    "__pycache__/",
    "migrations/",
]

# Игнорируем импорты без типов (устаревшие библиотеки)
ignore_missing_imports = true

# Для своих модулей игнорируем пропущенные импорты (пока)
[[tool.mypy.overrides]]
module = ["celery", "concurrent_log_handler", "pandas", "redis", "numpy"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["dataBaseModels", "src.dataBaseModels"]
ignore_errors = true